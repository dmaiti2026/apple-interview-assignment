<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen hidden">
    <div class="login-card">
        <div class="login-logo">
            <svg width="40" height="40" viewBox="0 0 814 1000" fill="currentColor">
                <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.3 135.3-316.9 268.8-316.9 68.5 0 125.5 45.2 168.7 45.2 41.3 0 106.3-47.9 183.5-47.9 28.3 0 130.3 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
            </svg>
        </div>
        <h1>Task Manager</h1>
        <p class="login-subtitle">Sign in to continue</p>
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" required />
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required />
            </div>
            <div id="login-error" class="alert alert-error hidden"></div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <div class="login-hint">
            <strong>Demo credentials:</strong><br/>
            admin / admin123 &nbsp;|&nbsp; manager1 / manager123 &nbsp;|&nbsp; user1 / user123
        </div>
        <div class="copyright">Copyright &copy; Dipankar Maiti</div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app-layout hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg width="24" height="24" viewBox="0 0 814 1000" fill="currentColor">
                <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.3 135.3-316.9 268.8-316.9 68.5 0 125.5 45.2 168.7 45.2 41.3 0 106.3-47.9 183.5-47.9 28.3 0 130.3 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
            </svg>
            <span>Task Manager</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-view="dashboard">
                <span class="nav-icon">&#9640;</span> Dashboard
            </a>
            <a href="#" class="nav-item" data-view="tasks">
                <span class="nav-icon">&#9776;</span> All Tasks
            </a>
            <a href="#" class="nav-item nav-approvals hidden" data-view="approvals">
                <span class="nav-icon">&#10003;</span> Pending Approvals
                <span id="pending-badge" class="badge"></span>
            </a>
            <a href="#" class="nav-item" data-view="calendar">
                <span class="nav-icon">&#128197;</span> Calendar
            </a>
        </nav>
        <div class="sidebar-footer">
            <div id="sidebar-user" class="sidebar-user">
                <div class="user-avatar" id="user-avatar-sidebar"></div>
                <div class="user-info">
                    <div id="sidebar-username" class="user-name"></div>
                    <div id="sidebar-role" class="user-role"></div>
                </div>
            </div>
            <button id="logout-btn" class="btn btn-ghost btn-sm">Sign Out</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <div id="page-title" class="page-title">Dashboard</div>
            <div class="topbar-actions">
                <button id="create-task-btn" class="btn btn-primary btn-sm">+ New Task</button>
                <button id="export-btn" class="btn btn-ghost btn-sm">Export CSV</button>
            </div>
        </header>

        <div id="content-area" class="content-area"></div>
        <footer class="app-footer">Copyright &copy; Dipankar Maiti</footer>
    </main>
</div>

<!-- CREATE TASK MODAL -->
<div id="task-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h2>Create New Task</h2>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <form id="task-form" class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="task-title">Title <span class="required">*</span></label>
                    <input type="text" id="task-title" placeholder="Enter task title" required />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" rows="3" placeholder="Describe the task..."></textarea>
                </div>
            </div>
            <div class="form-row two-col">
                <div class="form-group">
                    <label for="task-datetime">Date &amp; Time <span class="required">*</span></label>
                    <input type="datetime-local" id="task-datetime" required />
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority <span class="required">*</span></label>
                    <select id="task-priority" required>
                        <option value="">Select priority</option>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="task-assignee">Assign To</label>
                    <select id="task-assignee">
                        <option value="">Unassigned</option>
                    </select>
                </div>
            </div>
            <div id="form-error" class="alert alert-error hidden"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="form-cancel">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Task</button>
            </div>
        </form>
    </div>
</div>

<!-- APPROVE/REJECT MODAL -->
<div id="review-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
        <div class="modal-header">
            <h2 id="review-modal-title">Review Task</h2>
            <button class="modal-close" id="review-modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label for="review-comments">Comments (optional)</label>
                <textarea id="review-comments" rows="3" placeholder="Add a note..."></textarea>
            </div>
            <div id="review-error" class="alert alert-error hidden"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="review-cancel">Cancel</button>
                <button type="button" id="review-reject-btn" class="btn btn-danger">Reject</button>
                <button type="button" id="review-approve-btn" class="btn btn-success">Approve</button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast-container" class="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
